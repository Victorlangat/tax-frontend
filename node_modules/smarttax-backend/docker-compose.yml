
version: '3.8'

services:
  # MongoDB Database
  mongodb:
    image: mongo:6
    container_name: smarttax-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: smarttax123
      MONGO_INITDB_DATABASE: smarttax
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - smarttax-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: smarttax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass smarttax123
    volumes:
      - redis_data:/data
    networks:
      - smarttax-network

  # Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarttax-backend
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://admin:smarttax123@mongodb:27017/smarttax?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: smarttax123
      JWT_SECRET: your-production-jwt-secret-change-this
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/usr/src/app/uploads
      - ./logs:/usr/src/app/logs
    networks:
      - smarttax-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx Reverse Proxy (optional)
  nginx:
    image: nginx:alpine
    container_name: smarttax-nginx
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
    networks:
      - smarttax-network

networks:
  smarttax-network:
    driver: bridge

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local
